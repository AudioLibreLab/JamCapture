active_config: scarlett_studio
audio:
    backend: pipewire
    sample_rate: 48000
configs:
    scarlett_studio:
        auto_mix: true
        channels:
            - ref: 2i2_guitar
            - ref: 2i2_microphone
            - ref: chrome_stereo
              volume: 0.6  # Override volume
        output:
            format: flac
    guitar_only:
        auto_mix: true
        channels:
            - ref: 2i2_guitar
              volume: 5.0  # Boost for solo recording
        output:
            format: wav
    carla:
        auto_mix: true
        channels:
            - ref: carla
              volume: 1.5
            - ref: chrome
        output:
            format: flac
    xr18_studio:
        auto_mix: true
        channels:
            - ref: xr18_1
              name: ch1
            - ref: xr18_2
              name: ch2
            - ref: xr18_3
              name: ch3
            - ref: xr18_aux
              name: aux
        output:
            format: flac
definitions:
    channels:
        - id: 2i2_guitar
          name: guitar
          sources: ["alsa_input.usb-Focusrite_Scarlett_2i2_USB_Y814JK8264026F-00.analog-stereo:capture_FR"]
          audioMode: mono
          type: input
          volume: 4.0
          delay: 0
        - id: 2i2_microphone
          name: microphone
          sources: ["alsa_input.usb-Focusrite_Scarlett_2i2_USB_Y814JK8264026F-00.analog-stereo:capture_FL"]
          audioMode: mono
          type: input
          volume: 3.0
          delay: 0
        - id: chrome_stereo
          name: chrome
          sources: ["Chrome:output_FL", "Chrome:output_FR"]
          audioMode: stereo
          type: monitor
          volume: 0.8
        - audiomode: mono
          delay: 0
          id: carla
          sources:
            - Carla-Patchbay:audio-out1
          type: input
          volume: 4
        - audiomode: stereo
          delay: 0
          id: xr18_aux
          sources:
            - alsa_input.usb-BEHRINGER_XR18_production_03-00.pro-input-0:capture_AUX16
            - alsa_input.usb-BEHRINGER_XR18_production_03-00.pro-input-0:capture_AUX17
          type: input
          volume: 4
        - audiomode: mono
          delay: 0
          id: xr18_1
          sources:
            - alsa_input.usb-BEHRINGER_XR18_production_03-00.pro-input-0:capture_AUX0
          type: input
          volume: 4
        - audiomode: mono
          delay: 0
          id: xr18_2
          sources:
            - alsa_input.usb-BEHRINGER_XR18_production_03-00.pro-input-0:capture_AUX1
          type: input
          volume: 4
        - audiomode: mono
          delay: 0
          id: xr18_3
          sources:
            - alsa_input.usb-BEHRINGER_XR18_production_03-00.pro-input-0:capture_AUX2
          type: input
          volume: 4
        - audiomode: stereo
          delay: 0
          id: chrome
          sources:
            - Google Chrome:output_FR
            - Google Chrome:output_FL
          type: monitor
          volume: 0.8
globals:
    output:
        backingtracks_directory: ~/Audio/JamCapture/BackingTracks
        recordings_directory: ~/Audio/JamCapture/Recordings
supported_audio_extensions:
    - flac
    - wav
    - mp3
